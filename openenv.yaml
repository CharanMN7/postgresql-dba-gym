spec_version: 1
name: postgres_dba_gym
version: "0.1.0"
type: space
runtime: fastapi
app: app.server:app
port: 8000

description: |
  Live PostgreSQL 16 DBA training environment. Agents practice three real
  database administration tasks — index optimization, schema migration, and
  multi-symptom performance diagnosis — against a real Postgres instance
  running inside the same container. All grading is deterministic: every
  reward is computed from pg_catalog, information_schema, and pg_stat_*
  queries. There is zero LLM-as-judge.

  The environment exposes the standard OpenEnv HTTP contract (/reset, /step,
  /state, /health, /schema) plus two convenience routes (/tasks and
  /grade/{task_id}) for benchmark tooling.

tags:
  - openenv
  - postgres
  - dba
  - sql
  - database
  - tool-use

base_image: python:3.11-slim

# ---------------------------------------------------------------------------
# Action and observation spaces (advisory — Pydantic models in
# app/environment.py are the source of truth, surfaced via GET /schema).
# ---------------------------------------------------------------------------

action_space:
  type: object
  description: |
    A SQL statement (or supported psql meta-command) plus an optional
    self-declared completion flag. Multiple semicolon-separated statements
    are allowed and run one statement at a time so ALTER SYSTEM and
    VACUUM FULL work fine.
  properties:
    sql:
      type: string
      description: SQL statement(s) or supported psql meta-command.
    done:
      type: boolean
      description: Set true to declare the task complete.

observation_space:
  type: object
  description: |
    Pretty-printed query output, optional row dicts, error text, execution
    timing, and the current grading_breakdown so the agent can target the
    sub-rubric that is still 0.
  properties:
    output:        { type: string }
    rows:          { type: array, items: { type: object } }
    rowcount:      { type: integer }
    error:         { type: string }
    execution_ms:  { type: number }
    task_id:       { type: string }
    step_index:    { type: integer }
    max_steps:     { type: integer }
    grading_breakdown: { type: object }
    reward:        { type: number, minimum: 0.0, maximum: 1.0 }
    done:          { type: boolean }

reward:
  type: shaped
  range: [0.0, 1.0]
  description: |
    Every step is graded against the active task's deterministic rubric.
    Each task publishes its own sub-rubric breakdown so partial progress
    is visible to the agent.

# ---------------------------------------------------------------------------
# Tasks
# ---------------------------------------------------------------------------

tasks:
  - id: easy
    name: Index Optimization
    difficulty: easy
    description: |
      A 120K-row orders table is missing indexes and a customer-facing
      query is slow. Inspect the query, find the right composite index,
      create it, and verify the speedup with EXPLAIN ANALYZE.
    max_steps: 25
    success_threshold: 0.85
    grader: deterministic

  - id: medium
    name: Schema Migration
    difficulty: medium
    description: |
      Normalize a denormalized user_orders table (2000 rows / 200 distinct
      customers) into separate customers and orders tables with proper
      foreign keys, unique email constraint, and a backward-compatible
      view named user_orders_view that returns the same column names as
      the original table.
    max_steps: 30
    success_threshold: 0.85
    grader: deterministic

  - id: hard
    name: Performance Diagnosis
    difficulty: hard
    description: |
      The cluster has four simultaneous problems — missing indexes on a
      hot events table, 80% bloat on a logs table, three sub-optimal GUCs
      (work_mem, random_page_cost, effective_cache_size), and an idle
      blocker holding a row lock. Diagnose all four and apply fixes.
    max_steps: 30
    success_threshold: 0.85
    grader: deterministic

# ---------------------------------------------------------------------------
# Endpoints (auto-registered by openenv-core's create_app, plus our extras)
# ---------------------------------------------------------------------------

endpoints:
  reset:    POST /reset
  step:     POST /step
  state:    GET  /state
  health:   GET  /health
  schema:   GET  /schema
  tasks:    GET  /tasks
  grade:    GET  /grade/{task_id}
